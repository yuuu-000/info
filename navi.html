<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserAgent Info</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1f1f1f;
            color: #f5f5f5;
            padding: 15px;
            margin: 0 auto;
            max-width: 1100px;
        }

        ::selection {
            background-color: transparent;
            color: #fd5;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #f5f5f5;
            border-radius: 150px;
        }

        h2 {
            font-size: 17px;
            margin-bottom: 10px;
        }

        #time {
            font-size: 12px;
            margin-bottom: 25px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        th,
        td {
            border: .7px solid #555;
            padding: 6px 10px;
            word-break: break-word;
        }

        th {
            background: #444;
            font-weight: 400;
        }

        tr:nth-child(even) {
            background: #1a1a1a;
        }

        tr:nth-child(odd) {
            background: #2a2a2a;
        }

        i {
            color: #aaa;
        }

        @media (max-width: 600px) {
            body {
                padding: 5px 20px;
            }

            thead {
                display: none;
            }

            table,
            tbody,
            tr {
                display: block;
                border-radius: 0;
            }

            tr {
                margin-bottom: 13px;
                border: 1.5px solid #555;
                border-radius: 10px;
                overflow: hidden;
            }

            td {
                display: block;
                border: none;
            }

            td.key {
                background: #444;
                font-size: 12px;
                padding: 5px 10px;
            }

            td.value {
                background: #1a1a1a;
                font-size: 13px;
                padding: 7px 10px;
            }
        }
    </style>
</head>
<body>
    <h2>Navigator / UserAgentData</h2>
    <div id="time">Loading...</div>

    <table>
        <thead>
            <tr>
                <th>Key</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody id="ua-table"></tbody>
    </table>

    <script>
        const tbody = document.getElementById("ua-table");

        const keys = [
            { label: "userAgent", getValue: () => navigator.userAgent },
            { label: "appVersion", getValue: () => navigator.appVersion },
            { label: "platform", getValue: () => navigator.platform },
            { label: "appName", getValue: () => navigator.appName },
            { label: "appCodeName", getValue: () => navigator.appCodeName },
            { label: "product", getValue: () => navigator.product },
            { label: "productSub", getValue: () => navigator.productSub },
            { label: "vendor", getValue: () => navigator.vendor },
            { label: "vendorSub", getValue: () => navigator.vendorSub },
            { label: "oscpu", getValue: () => navigator.oscpu },
            { label: "buildID", getValue: () => navigator.buildID },
            { label: "userAgentData.brands", getValue: () => navigator.userAgentData?.brands },
            { label: "userAgentData.mobile", getValue: () => navigator.userAgentData?.mobile },
            { label: "userAgentData.platform", getValue: () => navigator.userAgentData?.platform }
        ];

        const rows = {};

        function formatValue(value) {
            if (value === undefined || value === null) {
                return "<i>(undefined)</i>";
            }
            if (typeof value === "string") {
                return value === "" ? "<i>(empty)</i>" : value;
            }
            if (typeof value === "boolean") {
                return `<i>(${value})</i>`;
            }
            if (typeof value === "object") {
                return JSON.stringify(value);
            }
            return value;
        }

        function createRow(label) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
        <td class="key">${label}</td>
        <td class="value"><i>(undefined)</i></td>
    `;
            tbody.appendChild(tr);
            rows[label] = tr.querySelector(".value");
        }

        keys.forEach(k => createRow(k.label));

        async function updateUA() {

            const highKeys = [
                "architecture",
                "bitness",
                "model",
                "platformVersion",
                "uaFullVersion",
                "fullVersionList",
                "formFactors",
                "wow64"
            ];

            if (navigator.userAgentData?.getHighEntropyValues) {
                const high = await navigator.userAgentData.getHighEntropyValues(highKeys);

                highKeys.forEach(key => {
                    const label = `userAgentData.${key} <strong>(highEntropy)</strong>`;
                    if (!rows[label]) createRow(label);
                    rows[label].innerHTML = formatValue(high[key]);
                });

            } else {
                highKeys.forEach(key => {
                    const label = `userAgentData.${key} <strong>(highEntropy)</strong>`;
                    if (!rows[label]) createRow(label);
                    rows[label].innerHTML = "<i>(High Entropy 未対応)</i>";
                });
            }

            keys.forEach(k => {
                rows[k.label].innerHTML = formatValue(k.getValue());
            });

            const now = new Date();
            const t =
                now.getFullYear() + "-" +
                String(now.getMonth() + 1).padStart(2, "0") + "-" +
                String(now.getDate()).padStart(2, "0") + " " +
                String(now.getHours()).padStart(2, "0") + ":" +
                String(now.getMinutes()).padStart(2, "0") + ":" +
                String(now.getSeconds()).padStart(2, "0");

            document.getElementById("time").textContent = "更新時刻: " + t;
        }

        updateUA();
        setInterval(updateUA, 1000);
    </script>
</body>
</html>
