<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UserAgent Info</title>

<style>
body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1e1e1e;
    color: #f5f5f5;
    padding: 16px;
}

h2 {
    font-size: 14px;
    margin-bottom: 12px;
}

#time {
    font-size: 13px;
    margin-bottom: 22px;
}

table {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
}

th, td {
    border: 1px solid #444;
    padding: 8px 10px;
    vertical-align: top;
    word-break: break-word;
}

th {
    background: #333;
    font-weight: 600;
}

tr:nth-child(even) { background: #2a2a2a; }
tr:nth-child(odd)  { background: #242424; }

i {
    color: #bbb;
}

/* ===== モバイル ===== */
@media (max-width: 600px) {

    thead {
        display: none;
    }

    table, tbody, tr {
        display: block;
        width: 100%;
    }

    tr {
        margin-bottom: 14px;
        border: 1px solid #444;
        border-radius: 6px;
        overflow: hidden;
    }

    td {
        display: block;
        border: none;
        padding: 10px 12px;
    }

    td.key {
        background: #333;
        font-weight: 600;
        font-size: 12px;
    }

    td.value {
        background: #1f1f1f;
        border-top: 1px solid #444;
        font-size: 12px;
    }
}
</style>
</head>

<body>
<h2>Navigator / UserAgentData</h2>
<div id="time">Loading...</div>

<table>
<thead>
<tr>
    <th>Key</th>
    <th>Value</th>
</tr>
</thead>
<tbody id="ua-table"></tbody>
</table>

<script>
const tbody = document.getElementById("ua-table");

const keys = [
    { label: "userAgent", getValue: () => navigator.userAgent },
    { label: "appVersion", getValue: () => navigator.appVersion },
    { label: "platform", getValue: () => navigator.platform },
    { label: "appName", getValue: () => navigator.appName },
    { label: "appCodeName", getValue: () => navigator.appCodeName },
    { label: "product", getValue: () => navigator.product },
    { label: "productSub", getValue: () => navigator.productSub },
    { label: "vendor", getValue: () => navigator.vendor },
    { label: "vendorSub", getValue: () => navigator.vendorSub },
    { label: "oscpu", getValue: () => navigator.oscpu },
    { label: "buildID", getValue: () => navigator.buildID },
    { label: "userAgentData.brands", getValue: () => navigator.userAgentData?.brands },
    { label: "userAgentData.mobile", getValue: () => navigator.userAgentData?.mobile },
    { label: "userAgentData.platform", getValue: () => navigator.userAgentData?.platform }
];

const rows = {};

function formatValue(value) {
    if (value === undefined || value === null) {
        return "<i>(undefined)</i>";
    }
    if (typeof value === "string") {
        return value === "" ? "<i>(empty)</i>" : value;
    }
    if (typeof value === "boolean") {
        return `<i>(${value})</i>`;
    }
    if (typeof value === "object") {
        return JSON.stringify(value);
    }
    return value;
}

function createRow(label) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td class="key">${label}</td>
        <td class="value"><i>(undefined)</i></td>
    `;
    tbody.appendChild(tr);
    rows[label] = tr.querySelector(".value");
}

keys.forEach(k => createRow(k.label));

async function updateUA() {

    if (navigator.userAgentData?.getHighEntropyValues) {
        const high = await navigator.userAgentData.getHighEntropyValues([
            "architecture",
            "bitness",
            "model",
            "platformVersion",
            "uaFullVersion",
            "fullVersionList",
            "formFactors",
            "wow64"
        ]);

        Object.entries(high).forEach(([key, value]) => {
            const label = `userAgentData.${key} <strong>(highEntropy)</strong>`;
            if (!rows[label]) createRow(label);
            rows[label].innerHTML = formatValue(value);
        });
    }

    keys.forEach(k => {
        rows[k.label].innerHTML = formatValue(k.getValue());
    });

    const now = new Date();
    const t =
        now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, "0") + "-" +
        String(now.getDate()).padStart(2, "0") + " " +
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0") + ":" +
        String(now.getSeconds()).padStart(2, "0");

    document.getElementById("time").textContent = "更新時刻: " + t;
}

updateUA();
setInterval(updateUA, 1000);
</script>
</body>
</html>
